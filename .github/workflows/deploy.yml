name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Join ZeroTier Network
        uses: zerotier/github-action@v1.0.1
        with:
          network_id: ${{ secrets.ZEROTIER_NETWORK_ID }}
          auth_token: ${{ secrets.ZEROTIER_CENTRAL_TOKEN }}

      - name: Wait for ZT connection
        run: |
          for i in $(seq 1 30); do
            ping -c 1 -W 2 ${{ secrets.RPI_ZT_IP }} > /dev/null 2>&1 && echo "Reachable!" && break
            echo "Attempt $i failed, retrying..."
            sleep 5
          done

      - name: Encode compose file
        run: echo "COMPOSE_B64=$(base64 -w 0 docker-compose.yml)" >> $GITHUB_ENV

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RPI_ZT_IP }}
          username: ${{ secrets.RPI_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: COMPOSE_B64
          script: |
            mkdir -p ~/dockerlobby
            echo "$COMPOSE_B64" | base64 -d > ~/dockerlobby/docker-compose.yml
            echo "LOBBY_IMAGE_TAG=${{ github.sha }}" > ~/dockerlobby/.env
            cd ~/dockerlobby
            echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
        env:
          COMPOSE_B64: ${{ env.COMPOSE_B64 }}
