name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".hadolint.yml"
      - ".dockerignore"
      - "ansible/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
      - "Makefile"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
 changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      python_deps: ${{ steps.filter.outputs.python_deps_any_changed }}
      ansible: ${{ steps.filter.outputs.ansible_any_changed }}
      docker: ${{ steps.filter.outputs.docker_any_changed }}
      python_code: ${{ steps.filter.outputs.python_code_any_changed }}
      hadolint: ${{ steps.filter.outputs.hadolint_any_changed }}
    steps:
      - uses: actions/checkout@v6
      - uses: tj-actions/changed-files@v45
        id: filter
        with:
          files_yaml: |
            python_deps:
              - 'pyproject.toml'
              - 'uv.lock'
            ansible:
              - 'ansible/**'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
            python_code:
              - 'src/**'
              - '**.py'
            hadolint:
              - '.hadolint.yml'
 quality:
    runs-on: ubuntu-24.04-arm
    if: needs.changes.outputs.python_code == 'true'
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Create venv
        run: |
            uv venv
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run:  uv sync --group dev --frozen
      - name: Lint
        run: make lint
    #  - name: Tests
    #    run:  make test
    #  - name: Upload coverage
    #    uses: codecov/codecov-action@v5
    #    with:
    #        token:

 security:
    needs: [changes]
    if: |
      needs.changes.outputs.python_deps == 'true' ||
      needs.changes.outputs.python_code == 'true' ||
      needs.changes.outputs.ansible == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
        security-events: write
        contents: read
    steps:
        - uses: actions/checkout@v6
        - name: Install uv
          uses: astral-sh/setup-uv@v7
          with:
                enable-cache: true
                python-version: "3.12"
        - name: Create venv
          run: |
                uv venv
                echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
        - name: Install tools
          run:  uv sync --only-group security
        - name: pip-audit
          if: needs.changes.outputs.python_deps == 'true'
          run: pip-audit . --strict --format json -o pip-audit-report.json || true
        - name: Bandit
          if: needs.changes.outputs.python_code == 'true'
          run: bandit -r . -ll --exclude ./.venv,./venv,./tests,./.github,/.git -f json -o bandit-report.json || true
        - name: Ansible Lint
          if: needs.changes.outputs.ansible == 'true'
          run: |
            ansible-galaxy collection install -r ansible/requirements.yml
            ansible-lint ansible/playbooks/deploy.yml
        - name: Trivy FS
          if: needs.changes.outputs.python_code == 'true' || needs.changes.outputs.python_deps == 'true'
          uses: aquasecurity/trivy-action@0.34.1
          with:
                scan-type: "fs"
                severity: "CRITICAL,HIGH"
                exit-code: "1"
                format: "sarif"
                output: "trivy-fs.sarif"
                limit-severities-for-sarif: true
        - name: Upload Trivy results to GitHub Security tab
          if: always() && hashFiles('trivy-fs.sarif') != ''
          uses: github/codeql-action/upload-sarif@v3
          with:
            sarif_file: trivy-fs.sarif
        - name: Upload security reports
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: security-reports-${{ github.sha }}
            path: |
              bandit-report.json
              pip-audit-report.json
              trivy-fs.sarif
            retention-days: 30
            if-no-files-found: ignore
 hadolint:
      runs-on: ubuntu-24.04-arm
      needs: [changes]
      if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.hadolint == 'true'
      steps:
      - uses: actions/checkout@v6
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
            dockerfile: Dockerfile
 gitleaks:
    runs-on: ubuntu-24.04-arm
    if: github.actor != 'dependabot[bot]'
    permissions:
        contents: read
        pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 analyze:
  runs-on: ubuntu-latest
  if: needs.changes.outputs.docker == 'true'
  permissions:
    security-events: write
    contents: read
  steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        queries: security-and-quality

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
 docker:
      runs-on: ubuntu-24.04-arm
      needs: [changes, quality, security, hadolint, gitleaks]
      if: |
            always() &&
            !contains(needs.*.result, 'failure') &&
            !contains(needs.*.result, 'cancelled') &&
            (needs.changes.outputs.python_code == 'true' ||
            needs.changes.outputs.python_deps == 'true' ||
            needs.changes.outputs.docker == 'true')
      permissions:
        contents: read
        packages: write
        security-events: write
      steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to GHCR
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Cache Trivy DB
          uses: actions/cache@v5
          with:
            path: .cache/trivy
            key: ${{ runner.os }}-trivy-db
            restore-keys: ${{ runner.os }}-trivy-
            
        - name: Build and load for scan
          uses: docker/build-push-action@v6
          with:
            context: .
            platforms: linux/arm/v7
            load: true
            tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp
            cache-from: type=gha,mode=max
            cache-to: type=gha,mode=max
        - name: Trivy image scan
          if: needs.changes.outputs.python_deps == 'true' || needs.changes.outputs.docker == 'true'
          uses: aquasecurity/trivy-action@0.34.1
          with:
            scanners: "vuln"
            image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp
            severity: 'CRITICAL,HIGH'
            exit-code: '1'
            cache-dir: .cache/trivy
            format: "sarif"
            output: "trivy-image.sarif"
            limit-severities-for-sarif: true
            
        - name: Upload Trivy image results to GitHub Security tab
          if: always() && hashFiles('trivy-image.sarif') != ''
          uses: github/codeql-action/upload-sarif@v3
          with:
                sarif_file: trivy-image.sarif
            
        - name: Upload docker artifacts
          if: always()
          uses: actions/upload-artifact@v4
          with:
             name: docker-reports-${{ github.sha }}
             path: trivy-image.sarif
             retention-days: 30
             if-no-files-found: ignore

        - name: Push final images
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          uses: docker/build-push-action@v6
          with:
                context: .
                platforms: linux/arm/v7
                push: true
                provenance: true
                sbom: true
                tags: |
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                cache-from: type=gha,mode=max
                cache-to: type=gha,mode=max
 cleanup:
        runs-on: ubuntu-24.04-arm
        needs: [docker]
        if: |
            always() &&
            needs.docker.result == 'success' &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
        permissions:
            packages: write
            contents: read
        steps:
          - name: Delete old image versions
            uses: actions/delete-package-versions@v5
            continue-on-error: true
            with:
                package-name: ${{ github.event.repository.name }}
                package-type: 'container'
                min-versions-to-keep: 5
